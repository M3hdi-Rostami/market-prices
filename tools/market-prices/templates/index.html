<template id="tpl-market-prices">
    <div class="market-prices-root h-full flex flex-col min-h-0">
        <div class="market-header-bar">
            <p id="market-current-datetime" class="market-header-clock">—</p>
            <button type="button" id="market-share-prices-btn" class="market-share-btn" aria-label="اشتراک‌گذاری تصویر قیمت"
                title="اشتراک‌گذاری تصویر قیمت">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M4 12v7a1 1 0 001 1h14a1 1 0 001-1v-7M16 8l-4-4-4 4M12 4v12" />
                </svg>
                <span>اشتراک تصویر</span>
            </button>
        </div>

        <div id="market-prices-panel" class="market-prices-panel flex flex-col flex-1 min-h-0 gap-2">
            <div id="market-loading" class="hidden flex-1 flex flex-col items-center justify-center gap-3">
                <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <span class="text-sm text-gray-500">در حال دریافت قیمت‌ها...</span>
            </div>

            <div id="market-error" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-center p-4">
                <div class="bg-red-100 text-red-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <p id="market-error-msg" class="text-sm text-gray-600">خطا در دریافت اطلاعات</p>
                <button id="market-retry-btn"
                    class="text-sm text-indigo-600 hover:text-indigo-500 font-medium">تلاش مجدد</button>
            </div>

            <div id="market-view-currency" class="market-view flex flex-col flex-1 min-h-0">
                <div id="market-currency-list"
                    class="price-cards-grid flex-1 overflow-y-auto no-scrollbar market-scroll-area hidden"></div>
            </div>

            <div id="market-view-gold" class="market-view hidden flex flex-col flex-1 min-h-0">
                <div id="market-gold-list"
                    class="price-cards-grid flex-1 overflow-y-auto no-scrollbar market-scroll-area hidden"></div>
            </div>
        </div>

        <div id="market-view-cars" class="market-view hidden flex flex-col flex-1 min-h-0 gap-2">
            <div class="divar-estimate-wrap">
                <label class="divar-estimate-label" for="divar-url-input">تخمین قیمت از آگهی دیوار</label>
                <div class="divar-estimate-row">
                    <input id="divar-url-input" type="url" inputmode="url" autocomplete="off"
                        placeholder="لینک آگهی خودرو در دیوار را بچسبانید..." class="divar-estimate-input" />
                    <button id="divar-estimate-btn" type="button" class="divar-estimate-btn"><span class="divar-estimate-btn-spinner" aria-hidden="true"></span><span class="divar-estimate-btn-label">تخمین</span></button>
                </div>
                <p id="divar-estimate-status" class="divar-estimate-status hidden"></p>
                <div id="divar-estimate-result" class="divar-estimate-result hidden"></div>
            </div>

            <div class="cars-search-wrap">
                <input id="cars-search" type="search" inputmode="search" autocomplete="off"
                    placeholder="جستجو برند یا مدل..." class="cars-search-input" />
            </div>

            <div id="cars-loading" class="hidden flex-1 flex flex-col items-center justify-center gap-3">
                <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                <span class="text-sm text-gray-500">در حال دریافت قیمت خودرو...</span>
            </div>

            <div id="cars-error" class="hidden flex-1 flex flex-col items-center justify-center gap-3 text-center p-4">
                <div class="bg-red-100 text-red-600 p-3 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <p id="cars-error-msg" class="text-sm text-gray-600">خطا در دریافت اطلاعات</p>
                <button id="cars-retry-btn"
                    class="text-sm text-indigo-600 hover:text-indigo-500 font-medium">تلاش مجدد</button>
            </div>

            <div id="cars-list-wrap" class="cars-list-wrap hidden flex-1 min-h-0 market-scroll-area">
                <div id="cars-list" class="cars-list"></div>
            </div>
        </div>

        <div id="market-view-more" class="market-view hidden flex flex-col flex-1 min-h-0">
            <div class="market-more-scroll flex-1 overflow-y-auto no-scrollbar market-scroll-area">
                <section class="market-more-section">
                    <h3 class="market-more-section-title">ظاهر</h3>
                    <button type="button" id="market-theme-toggle" class="market-more-row">
                        <span class="market-more-row-label">تم اپلیکیشن</span>
                        <span id="market-theme-toggle-value" class="market-more-row-value">تم تاریک</span>
                    </button>
                </section>

                <section class="market-more-section">
                    <h3 class="market-more-section-title">اعلان قیمت</h3>
                    <label class="market-more-row market-more-toggle-row">
                        <span class="market-more-row-label">هشدار تغییر قیمت</span>
                        <input type="checkbox" id="market-alerts-enabled" class="market-more-switch" />
                    </label>
                    <div class="market-more-field">
                        <label for="market-alerts-threshold" class="market-more-field-label">آستانه تغییر (٪)</label>
                        <input id="market-alerts-threshold" type="number" min="0.1" max="50" step="0.1"
                            inputmode="decimal" class="market-more-input" />
                    </div>
                    <p class="market-more-hint">وقتی دلار یا طلای ۱۸ عیار بیش از این درصد تغییر کند، اعلان نمایش داده
                        می‌شود.</p>
                </section>

                <section class="market-more-section">
                    <h3 class="market-more-section-title">درباره</h3>
                    <div class="market-more-row market-more-row-static">
                        <span class="market-more-row-label">نسخه افزونه</span>
                        <span id="market-extension-version" class="market-more-row-value">—</span>
                    </div>
                </section>

                <p class="market-more-copyright">
                    طراحی و توسعه توسط
                    <a href="https://t.me/m3hdi_v1" target="_blank" rel="noopener noreferrer" dir="ltr"
                        class="market-more-copyright-link">m3hdi_v1</a>
                    |
                    <span id="market-copyright-year"></span> &copy;
                </p>
            </div>
        </div>

        <div id="market-price-toast" class="market-price-toast hidden" role="status" aria-live="polite"></div>

        <nav class="market-bottom-nav market-bottom-nav-quad" aria-label="منوی قیمت‌ها">
            <button type="button" class="market-nav-btn is-active" data-market-tab="currency">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="market-nav-label">ارز</span>
            </button>

            <button type="button" class="market-nav-btn" data-market-tab="gold">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
                </svg>
                <span class="market-nav-label">طلا</span>
            </button>

            <div class="market-nav-fab-wrap">
                <button type="button" id="market-nav-refresh" class="market-nav-fab" aria-label="بروزرسانی قیمت‌ها"
                    title="بروزرسانی">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <button type="button" class="market-nav-btn" data-market-tab="cars">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M8 17h.01M16 17h.01M3 13l1.5-4.5A2 2 0 016.4 7h11.2a2 2 0 011.9 1.5L21 13m-18 0h18m-18 0v4a1 1 0 001 1h1a1 1 0 001-1v-1h12v1a1 1 0 001 1h1a1 1 0 001-1v-4" />
                </svg>
                <span class="market-nav-label">خودرو</span>
            </button>

            <button type="button" class="market-nav-btn" data-market-tab="more">
                <svg class="market-nav-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z" />
                </svg>
                <span class="market-nav-label">بیشتر</span>
            </button>
        </nav>
    </div>
</template>
